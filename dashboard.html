<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Processor Dashboard</title>
    <style>
        body { font-family: sans-serif; margin: 40px; line-height: 1.6; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #f4f4f4; }
        .filter-section { margin-bottom: 20px; }
        input[type="text"] { padding: 8px; width: 250px; }
        button { padding: 8px 15px; cursor: pointer; border: 1px solid #ccc; background: #f9f9f9; }
        button:hover { background: #e9e9e9; }
        .tag-pill {
            display: inline-block;
            background: #e1f5fe;
            color: #01579b;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-right: 5px;
            border: 1px solid #b3e5fc;
        }
    </style>
</head>
<body>
    <h1>Processed Documents Dashboard</h1>
    <div class="filter-section">
        <form action="/" method="get">
            <input type="text" name="tag" placeholder="Filter by tag..." value="{{ tag_query }}">
            <button type="submit">Filter</button>
            <a href="/"><button type="button">Clear</button></a>
        </form>
    </div>

    <table>
        <thead>
            <tr>
                <th>Filename</th>
                <th>Upload Date</th>
                <th>Tags</th>
                <th>Word Count</th>
            </tr>
        </thead>
        <tbody>
            {% for doc in documents %}
            <tr>
                <td>{{ doc.filename }}</td>
                <td>{{ doc.upload_date }}</td>
                <td>
                    {% for tag in (doc.tags or "").split(',') if tag %}
                    <span class="tag-pill">{{ tag }}</span>
                    {% endfor %}
                </td>
                <td>{{ doc.word_count }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
